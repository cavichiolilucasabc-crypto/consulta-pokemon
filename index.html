<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Cartas Pokémon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    
    <div class="tema-area">
      <button class="tema-btn" onclick="alternarTema()">
        🎨 Trocar tema
      </button>
  </div>
    
    <h1>Consulta de Cartas Pokémon</h1>

    <p class="descricao">
      Digite o nome do Pokémon, selecione uma sugestão e depois informe o código da carta.
    </p>

    <div class="box-busca">

      <input 
        type="text" 
        id="campoPokemon" 
        placeholder="Nome do Pokémon. Ex: Pikachu"
        autocomplete="off"
      >

      <div id="sugestoesPokemon" class="sugestoes"></div>

      <input 
        type="text" 
        id="campoCarta" 
        placeholder="Código da carta. Ex: 84131"
      >

      <button onclick="buscarCarta()">
        Buscar preço
      </button>

    </div>

    <div id="resultado" class="resultado"></div>

<div class="abas-area">
  <button class="aba-btn ativa" onclick="mostrarAba('historico')">
    Últimas buscas
  </button>

  <button class="aba-btn" onclick="mostrarAba('favoritos')">
    Favoritos
  </button>

  <button class="aba-btn" onclick="mostrarAba('preciso')">
    Preciso
  </button>
</div>

<div id="abaHistorico" class="aba-conteudo ativa">
  <div id="historico" class="historico"></div>
</div>

<div id="abaFavoritos" class="aba-conteudo">
  <div id="favoritos" class="historico"></div>
</div>

<div id="abaPreciso" class="aba-conteudo">
  <div id="precisoColecao" class="historico"></div>
</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
